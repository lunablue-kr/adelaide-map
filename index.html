<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adelaide 지역 가이드</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@600;700&display=swap');
  :root{
    --bg:#0c0f14;--panel:#0f1219;--surface2:#1a1f2b;--border:#262c3a;--border2:#2e3546;
    --text:#dde1ec;--muted:#5c6278;--muted2:#8890a8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100%;overflow:hidden;}
  #map{position:absolute;inset:0;}
  .leaflet-interactive{transition:fill-opacity 0.25s ease,stroke-opacity 0.25s ease,stroke-width 0.2s ease;}
  .leaflet-interactive:focus,.leaflet-interactive:focus-visible{outline:none!important;}

  /* ── 좌측 통합 패널 ─────────────────────── */
  #side-panel{position:absolute;top:14px;left:14px;bottom:14px;width:232px;z-index:1000;
    background:rgba(15,18,25,0.94);backdrop-filter:blur(12px);border:1px solid var(--border);
    border-radius:14px;padding:16px 15px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}
  #side-panel::-webkit-scrollbar{width:3px;}
  #side-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .sp-head{display:flex;justify-content:space-between;align-items:center;gap:6px;}
  .sp-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;letter-spacing:0.3px;white-space:nowrap;}
  .sp-lang{font-family:'DM Mono',monospace;font-size:16px;line-height:1;color:var(--muted2);cursor:pointer;border:1px solid var(--border);border-radius:12px;padding:2px 9px;transition:all 0.15s;}
  .sp-lang:hover{color:var(--text);border-color:var(--muted2);}
  .sp-search{background:var(--surface2);border:1px solid transparent;border-radius:18px;padding:9px 14px;
    color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color 0.15s;}
  .sp-search::placeholder{color:var(--muted);}
  .sp-search:focus{border-color:var(--muted2);}
  .sp-glabel{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
  .chip-wrap{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{font-size:12.5px;color:var(--muted2);border:1px solid var(--border);border-radius:16px;padding:4px 12px;cursor:pointer;transition:all 0.15s;}
  .chip:hover{color:var(--text);border-color:var(--muted2);}
  .chip.on{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500;}
  .ov-row{display:flex;align-items:center;gap:8px;padding:4px 2px;cursor:pointer;border-radius:6px;}
  .ov-row:hover{background:rgba(221,225,236,0.05);}
  .ov-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--muted);flex-shrink:0;position:relative;transition:all 0.15s;}
  .ov-row.on .ov-check{background:var(--ac);border-color:var(--ac);}
  .ov-row.on .ov-check::after{content:'';position:absolute;left:5px;top:2px;width:4px;height:8px;border:solid #0c0f14;border-width:0 2px 2px 0;transform:rotate(45deg);}
  .ov-label{font-size:13px;color:var(--muted2);flex:1;}
  .ov-row.on .ov-label{color:var(--text);}
  .ov-swatch{width:14px;border-top:2px solid;flex-shrink:0;}
  .ov-swatch.dash{border-top-style:dashed;}
  .ov-swatch.dot{border:none;width:8px;height:8px;border-radius:50%;}
  .seg{display:flex;gap:3px;background:var(--surface2);border-radius:16px;padding:3px;}
  .seg-btn{flex:1;text-align:center;font-size:12px;color:var(--muted2);border-radius:12px;padding:5px 0;cursor:pointer;transition:all 0.15s;}
  .seg-btn.on{background:var(--text);color:var(--bg);font-weight:500;}
  .fb-open{margin-top:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
    color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;padding:10px 0;
    text-align:center;cursor:pointer;transition:all 0.15s;}
  .fb-open:hover{border-color:var(--muted2);}
  .sp-foot{font-size:10px;color:var(--muted);line-height:1.7;}

  /* ── 검색 드롭다운 ─────────────────────── */
  .sp-results{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:none;max-height:220px;overflow-y:auto;}
  .sp-results.on{display:block;}
  .sp-results::-webkit-scrollbar{width:3px;}
  .sp-results::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .spr-item{padding:7px 11px;cursor:pointer;display:flex;justify-content:space-between;align-items:baseline;gap:8px;border-bottom:1px solid rgba(38,44,58,0.5);}
  .spr-item:last-child{border-bottom:none;}
  .spr-item:hover,.spr-item.active{background:rgba(221,225,236,0.06);}
  .spr-name{font-size:12.5px;}
  .spr-meta{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted2);white-space:nowrap;}

  /* ── 바텀시트 ─────────────────────────── */
  #bottom-sheet{position:absolute;left:226px;right:14px;bottom:14px;z-index:1000;max-height:52vh;
    background:rgba(15,18,25,0.95);backdrop-filter:blur(12px);border:1px solid var(--border2);
    border-radius:14px;padding:13px 18px;transform:translateY(calc(100% + 20px));transition:transform 0.3s ease;overflow-y:auto;}
  #bottom-sheet.on{transform:translateY(0);}
  #bottom-sheet::-webkit-scrollbar{width:3px;}
  #bottom-sheet::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .bs-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .bs-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;line-height:1.1;white-space:nowrap;}
  .bs-sub{font-size:11.5px;color:var(--muted2);}
  .bs-kw{font-size:13px;font-weight:500;flex:1;min-width:140px;}
  .bs-btns{display:flex;align-items:center;gap:10px;margin-left:auto;}
  .bs-collapse,.bs-close{color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;}
  .bs-collapse:hover,.bs-close:hover{color:var(--text);}
  .bs-chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
  .bs-chip{font-size:12px;border-radius:15px;padding:4px 13px;white-space:nowrap;}
  .bs-detail{max-height:400px;overflow:hidden;transition:max-height 0.3s ease;}
  .bs-detail.off{max-height:0;}
  .bs-grid{display:flex;gap:22px;padding-top:11px;border-top:1px solid var(--border);margin-top:11px;}
  .bs-left{flex:1;min-width:0;}
  .bs-desc{font-size:12.5px;color:rgba(221,225,236,0.75);line-height:1.85;}
  .bs-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
  .bs-tag{font-size:11px;padding:2px 8px;border-radius:12px;border:1px solid;}
  .bs-bars{width:290px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
  .bar-row{display:flex;align-items:center;gap:8px;}
  .bar-lbl{width:42px;font-size:12px;color:var(--muted2);flex-shrink:0;}
  .bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:3px;}
  .bar-val{font-size:11.5px;color:var(--muted2);white-space:nowrap;min-width:70px;text-align:right;}

  /* ── 우측 미니 범례 ───────────────────── */
  #mini-legend{position:absolute;right:14px;top:14px;z-index:999;background:rgba(15,18,25,0.92);
    border:1px solid var(--border);border-radius:12px;padding:12px 15px;max-width:210px;}
  .ml-title{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
  .ml-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted2);padding:2px 0;}
  .ml-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .ml-bar{display:flex;height:8px;border-radius:3px;overflow:hidden;margin:3px 0;}
  .ml-ends{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);}
  .ml-note{font-size:9.5px;color:var(--muted);line-height:1.5;margin-top:4px;}

  /* ── 바이브 라벨 / 마커 / 툴팁 ─────────── */
  .vibe-label{font-family:'Noto Sans KR',sans-serif;font-weight:700;white-space:nowrap;
    text-shadow:0 1px 8px rgba(0,0,0,0.9),0 0 3px rgba(0,0,0,0.9);pointer-events:none;transform:translate(-50%,-50%);}
  .uni-pulse{width:15px;height:15px;background:#e8c87a;border-radius:50%;border:2px solid #fff;animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(232,200,122,0.65)}70%{box-shadow:0 0 0 13px rgba(232,200,122,0)}100%{box-shadow:0 0 0 0 rgba(232,200,122,0)}}
  .sub-tip{background:var(--surface2)!important;border:1px solid var(--border)!important;color:var(--text)!important;font-family:'Noto Sans KR',sans-serif!important;font-size:10.5px!important;border-radius:6px!important;box-shadow:0 6px 20px rgba(0,0,0,0.6)!important;padding:3px 9px!important;}
  .sub-tip::before{display:none!important;}
  .leaflet-popup-content-wrapper{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;box-shadow:0 16px 48px rgba(0,0,0,0.85);padding:0;max-width:280px;}
  .leaflet-popup-tip{background:var(--surface2);}
  .leaflet-popup-content{margin:0;}
  .leaflet-popup-close-button{color:var(--muted)!important;top:8px!important;right:10px!important;font-size:16px!important;}
  .popup-inner{padding:14px 16px 13px;}
  .popup-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;line-height:1.2;margin-bottom:2px;}
  .popup-sub{font-size:10px;color:var(--muted2);margin-bottom:7px;}
  .popup-desc{font-size:11px;color:rgba(221,225,236,0.72);line-height:1.75;}

  /* ── 피드백 모달 ─────────────────────── */
  #fb-overlay{position:fixed;inset:0;z-index:3000;background:rgba(5,7,10,0.72);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:20px;}
  #fb-overlay.on{display:flex;}
  #fb-modal{background:var(--panel);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:460px;
    padding:20px 22px;max-height:88vh;overflow-y:auto;}
  .fbm-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .fbm-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;}
  .fbm-close{color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;}
  .fbm-close:hover{color:var(--text);}
  .fbm-sub{font-size:11px;color:var(--muted2);line-height:1.7;margin-bottom:14px;}
  .fbm-row{display:flex;gap:8px;margin-bottom:9px;}
  .fbm-g{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
  .fbm-g label{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
  .fbm-g input,.fbm-g select,.fbm-g textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:11.5px;padding:7px 10px;outline:none;transition:border-color 0.18s;width:100%;}
  .fbm-g input:focus,.fbm-g select:focus,.fbm-g textarea:focus{border-color:var(--muted2);}
  .fbm-g textarea{resize:vertical;min-height:84px;}
  .fbm-g select option{background:var(--surface2);}
  .fbm-actions{display:flex;align-items:center;gap:10px;margin-top:10px;}
  .fbm-send{background:var(--text);color:var(--bg);border:none;border-radius:8px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1px;padding:8px 18px;cursor:pointer;text-transform:uppercase;transition:opacity 0.18s;}
  .fbm-send:hover{opacity:0.85;}
  .fbm-send:disabled{opacity:0.35;cursor:not-allowed;}
  .fbm-status{font-size:11px;color:var(--muted2);}
  .fbm-status.ok{color:#4ade80;}
  .fbm-status.err{color:#f87171;}

  .toast{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:2000;
    background:var(--surface2);border:1px solid var(--border2);border-radius:20px;
    padding:7px 16px;font-size:11.5px;color:var(--text);opacity:0;transition:opacity 0.3s;pointer-events:none;}
  .toast.on{opacity:1;}

  /* ── 모바일 전용 컴포넌트 (기본 숨김) ─────── */
  #m-top{display:none;position:absolute;top:10px;left:10px;right:10px;z-index:1100;gap:8px;align-items:center;}
  #m-search{flex:1;background:rgba(15,18,25,0.95);border:1px solid var(--border2);border-radius:18px;padding:8px 14px;
    color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;min-width:0;}
  #m-search::placeholder{color:var(--muted);}
  #m-lang{font-family:'DM Mono',monospace;font-size:15px;line-height:1;color:var(--muted2);background:rgba(15,18,25,0.95);
    border:1px solid var(--border2);border-radius:14px;padding:6px 11px;cursor:pointer;white-space:nowrap;}
  #m-results{display:none;position:absolute;top:46px;left:10px;right:10px;z-index:1100;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:200px;overflow-y:auto;}
  #m-results.on{display:block;}
  #m-chips{display:none;position:absolute;top:56px;left:0;right:0;z-index:1090;gap:6px;padding:0 10px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  #m-chips::-webkit-scrollbar{display:none;}
  #m-chips .chip{flex-shrink:0;background:rgba(15,18,25,0.92);}
  #m-chips .chip.on{background:var(--text);}
  #m-fabs{display:none;position:absolute;right:10px;top:104px;z-index:1090;flex-direction:column;gap:8px;}
  .fab{width:38px;height:38px;border-radius:50%;background:rgba(15,18,25,0.95);border:1px solid var(--border2);
    display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;cursor:pointer;user-select:none;}
  .fab.active{background:var(--text);color:var(--bg);}
  .m-pop{display:none;position:absolute;right:56px;z-index:1095;background:rgba(15,18,25,0.97);
    border:1px solid var(--border2);border-radius:12px;padding:10px 12px;min-width:150px;}
  .m-pop.on{display:block;}
  #m-pop-layers{top:104px;}
  #m-pop-color{top:150px;}
  #ml-chip{display:none;position:absolute;left:10px;bottom:14px;z-index:1090;background:rgba(15,18,25,0.92);
    border:1px solid var(--border2);border-radius:14px;padding:5px 12px;color:var(--muted2);font-size:11px;cursor:pointer;align-items:center;gap:4px;}
  body.sheet-on #ml-chip{display:none!important;}

  @media(max-width:680px){
    #side-panel{display:none;}
    #m-top{display:flex;}
    #m-chips{display:flex;}
    #m-fabs{display:flex;}
    #ml-chip{display:flex;}
    #mini-legend{top:auto;right:auto;left:10px;bottom:52px;display:none;max-width:180px;}
    #mini-legend.open{display:block;}
    #bottom-sheet{left:10px;right:10px;max-height:32vh;padding:11px 13px;}
    .bs-grid{flex-direction:column;gap:12px;}
    .bs-bars{width:100%;}
    .bs-kw{min-width:100%;}
    .leaflet-bottom.leaflet-right{bottom:46px;}
  }
  @media(min-width:681px){
    #m-top,#m-chips,#m-fabs,#ml-chip,#m-results,.m-pop{display:none!important;}
  }
  @media(min-width:1600px){
    #side-panel{width:264px;padding:18px 17px;}
    .sp-title{font-size:22px;}
    .chip{font-size:13.5px;}
    .ov-label{font-size:14px;}
    .seg-btn{font-size:13px;}
    #mini-legend{max-width:240px;}
    .ml-item{font-size:13.5px;}
    .bs-name{font-size:24px;}
    .bs-desc{font-size:13.5px;}
    .bs-bars{width:330px;}
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="side-panel">
  <div class="sp-head">
    <span class="sp-title" id="sp-title">Adelaide 가이드</span>
    <span class="sp-lang" id="lang-toggle">EN</span>
  </div>
  <input class="sp-search" id="sp-search" placeholder="서버브·지역 검색" autocomplete="off"/>
  <div class="sp-results" id="sp-results"></div>

  <div class="sp-glabel" id="lbl-cat">카테고리</div>
  <div class="chip-wrap" id="cat-chips"></div>

  <div class="sp-glabel" id="lbl-overlay">오버레이</div>
  <div id="ov-rows"></div>

  <div class="sp-glabel" id="lbl-color">지도 색상</div>
  <div class="seg" id="color-seg"></div>

  <div class="fb-open" id="fb-open">피드백 남기기</div>
  <div class="sp-foot" id="sp-foot"></div>
</div>

<div id="mini-legend"></div>

<div id="m-top">
  <input id="m-search" placeholder="서버브·지역 검색" autocomplete="off"/>
  <span id="m-lang">EN</span>
</div>
<div id="m-results"></div>
<div id="m-chips"></div>
<div id="m-fabs">
  <div class="fab" id="fab-layers" title="레이어">⧉</div>
  <div class="fab" id="fab-color" title="지도 색상">◑</div>
  <div class="fab" id="fab-fb" title="피드백">✉</div>
</div>
<div class="m-pop" id="m-pop-layers"><div id="m-ov-rows"></div></div>
<div class="m-pop" id="m-pop-color"><div class="seg" id="m-color-seg" style="flex-direction:column;border-radius:10px;"></div></div>
<div id="ml-chip"><span id="ml-chip-label">범례</span> ▸</div>

<div id="bottom-sheet">
  <div class="bs-top">
    <div style="min-width:140px">
      <div class="bs-name" id="bs-name"></div>
      <div class="bs-sub" id="bs-sub"></div>
    </div>
    <div class="bs-kw" id="bs-kw"></div>
    <div class="bs-btns">
      <span class="bs-collapse" id="bs-collapse">▾</span>
      <span class="bs-close" id="bs-close">✕</span>
    </div>
  </div>
  <div class="bs-chiprow" id="bs-chips"></div>
  <div class="bs-detail" id="bs-detail">
    <div class="bs-grid">
      <div class="bs-left">
        <div class="bs-desc" id="bs-desc"></div>
        <div class="bs-tags" id="bs-tags"></div>
      </div>
      <div class="bs-bars" id="bs-bars"></div>
    </div>
  </div>
</div>

<div id="fb-overlay">
  <div id="fb-modal">
    <div class="fbm-head"><span class="fbm-title" id="fbm-title">피드백 남기기</span><span class="fbm-close" id="fbm-close">✕</span></div>
    <div class="fbm-sub" id="fbm-sub">정보 정정, 꿀팁, 질문 모두 환영합니다 — 남겨주신 내용은 지도 제작자에게 메일로 전달되며, 검토 후 가이드에 반영됩니다.</div>
    <div class="fbm-row">
      <div class="fbm-g"><label id="fbm-lbl-author">닉네임 (선택)</label><input type="text" id="f-author" placeholder="익명 가능" maxlength="20"/></div>
      <div class="fbm-g"><label id="fbm-lbl-type">유형</label>
        <select id="f-type"><option value="tip">💡 꿀팁</option><option value="correction">🔧 정정</option><option value="experience">✨ 경험담</option><option value="question">❓ 질문</option></select>
      </div>
    </div>
    <div class="fbm-row">
      <div class="fbm-g"><label id="fbm-lbl-area">관련 지역</label>
        <select id="f-area">
          <option id="opt-none">전체/없음</option><option>City of Adelaide</option><option>City of Unley</option>
          <option>City of Norwood P&SP</option><option>City of Prospect</option><option>Town of Walkerville</option>
          <option>City of Burnside</option><option>City of Holdfast Bay</option><option>City of Charles Sturt</option>
          <option>City of West Torrens</option><option>City of Marion</option><option>City of Mitcham</option>
          <option>Campbelltown City</option><option>City of Port Adelaide Enfield</option><option>City of Tea Tree Gully</option>
          <option>City of Onkaparinga</option><option>City of Salisbury</option><option>City of Playford</option><option>Town of Gawler</option>
        </select>

// ═══════════════ 색상 모드 & LGA 스타일 ═══════════════
let mapColorMode='category', activeCat='all', selectedLgaId=null;
const RENT_SCALE=['#34d399','#84cc16','#eab308','#f97316','#e11d48'];
const CRIME_SCALE=['#4ade80','#a3e635','#facc15','#fb923c','#ef4444'];
const RENT_MID={};Object.entries(RENT).forEach(([id,r])=>RENT_MID[id]=(r[0]+r[1])/2);
function bucketize(byId,quantile){
  const es=Object.entries(byId),out={};
  if(quantile){const s=[...es].sort((a,b)=>a[1]-b[1]);s.forEach(([id],i)=>out[id]=Math.min(4,Math.floor(i/s.length*5)));}
  else{const vs=es.map(e=>e[1]),mn=Math.min(...vs),mx=Math.max(...vs);es.forEach(([id,v])=>out[id]=mx===mn?0:Math.min(4,Math.floor((v-mn)/(mx-mn)*5)));}
  return out;
}
let rentB=null,crimeB=null;
function lgaColor(id){
  if(mapColorMode==='rent'){if(!rentB)rentB=bucketize(RENT_MID);return RENT_SCALE[rentB[id]??0];}
  if(mapColorMode==='crime'){if(!crimeB)crimeB=bucketize(CRIME,true);return CRIME_SCALE[crimeB[id]??0];}
  return CAT_META[LGAS[id].cat].color;
}
// 치안 순위 (1 = 신고율 최저)
const CRIME_RANK={};
Object.entries(CRIME).sort((a,b)=>a[1]-b[1]).forEach(([id],i)=>CRIME_RANK[id]=i+1);
const MAX_ST=Math.max(...Object.values(LGA_STATS).map(s=>s.st));
const MAX_SCH=Math.max(...Object.values(LGA_STATS).map(s=>s.sch));
const RENT_MIN=Math.min(...Object.values(RENT_MID)),RENT_MAX=Math.max(...Object.values(RENT_MID));

function restyleAll(){
  const choro=mapColorMode!=='category'; // 렌트/치안 모드는 진하게 채워야 높낮이가 읽힘
  const fillBase=choro?0.52:0.18, fillDim=choro?0.14:0.03, fillSel=choro?0.72:0.5, fillOther=choro?0.12:0.05;
  Object.entries(lgaLayers).forEach(([id,layer])=>{
    const c=lgaColor(id);
    if(id===selectedLgaId){layer.setStyle({color:'#fff',weight:3,opacity:1,fillColor:c,fillOpacity:fillSel});layer.bringToFront();}
    else if(selectedLgaId){layer.setStyle({color:c,weight:1,opacity:0.25,fillColor:c,fillOpacity:fillOther});}
    else{
      const dim=activeCat!=='all'&&LGAS[id].cat!==activeCat;
      layer.setStyle({color:choro?'#0c0f14':c,weight:choro?1:1.8,opacity:dim?0.2:0.9,fillColor:c,fillOpacity:dim?fillDim:fillBase});
    }
  });
  renderMiniLegend();
}

const lgaLayers={};
Object.entries(LGA_BOUNDARIES).forEach(([id,geom])=>{

});

// ═══════════════ 검색 ═══════════════
function searchQuery(q){
  q=q.trim().toLowerCase();
  if(q.length<2)return[];
  const starts=[],contains=[];
  Object.entries(LGAS).forEach(([id,d])=>{
    const n=d.name.toLowerCase();
    if(n.startsWith(q))starts.push({type:'lga',id});
    else if(n.includes(q))contains.push({type:'lga',id});
  });
  SUBURBS.forEach((s,si)=>{
    const n=s.n.toLowerCase();
    if(n.startsWith(q))starts.push({type:'sub',si});
    else if(n.includes(q)||(s.pc&&s.pc.startsWith(q)))contains.push({type:'sub',si});
  });
  return starts.concat(contains).slice(0,8);
}
function focusSuburb(si){
  const s=SUBURBS[si];if(!s)return;
  if(!suburbOn)setSuburbLayer(true);
  const poly=suburbPolys[si];if(!poly)return;
  deselectSuburb();selectedSubPoly=poly;poly.setStyle(SUB_SEL);poly.bringToFront();
  openSheet(s.l);
  map.fitBounds(poly.getBounds(),{padding:[60,60],maxZoom:14});
}
function focusLga(id){
  deselectSuburb();openSheet(id);
  if(lgaLayers[id])map.fitBounds(lgaLayers[id].getBounds(),{padding:[40,40],maxZoom:13});
}
// 검색 배선 — 데스크톱/모바일 입력창 공용
function wireSearch(inputEl,resultsEl){
  let items=[],active=-1;
  function render(list){
    items=list;active=-1;
    if(!list.length){
      resultsEl.innerHTML=`<div class="spr-item"><span class="spr-name" style="color:var(--muted)">${T().searchNone}</span></div>`;
      resultsEl.classList.add('on');return;
    }
    resultsEl.innerHTML=list.map((it,i)=>{
      if(it.type==='lga'){
        const d=LGAS[it.id];
        return `<div class="spr-item" data-i="${i}"><span class="spr-name">${d.name}</span><span class="spr-meta">${T().searchCouncil}</span></div>`;
      }
      const s=SUBURBS[it.si],d=LGAS[s.l];
      return `<div class="spr-item" data-i="${i}"><span class="spr-name">${s.n}</span><span class="spr-meta">${s.pc?s.pc+' · ':''}${d?d.name.replace('City of ','').replace('Town of ','').replace('The City of ',''):''}</span></div>`;
    }).join('');
    resultsEl.classList.add('on');
    resultsEl.querySelectorAll('.spr-item[data-i]').forEach(el=>{
      el.addEventListener('mousedown',(e)=>{e.preventDefault();pick(parseInt(el.dataset.i));});
    });
  }
  function pick(i){
    const it=items[i];if(!it)return;
    resultsEl.classList.remove('on');items=[];
    inputEl.value=it.type==='lga'?LGAS[it.id].name:SUBURBS[it.si].n;
    inputEl.blur();
    if(it.type==='lga')focusLga(it.id);else focusSuburb(it.si);
  }
  inputEl.addEventListener('input',()=>{
    if(inputEl.value.trim().length<2){resultsEl.classList.remove('on');return;}
    render(searchQuery(inputEl.value));
  });
  inputEl.addEventListener('keydown',(e)=>{
    if(!items.length&&e.key!=='Escape')return;
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){
      e.preventDefault();
      active=e.key==='ArrowDown'?Math.min(active+1,items.length-1):Math.max(active-1,0);
      resultsEl.querySelectorAll('.spr-item').forEach((el,i)=>el.classList.toggle('active',i===active));
    }else if(e.key==='Enter'){e.preventDefault();pick(active>=0?active:0);}
    else if(e.key==='Escape'){resultsEl.classList.remove('on');inputEl.blur();}
  });
  inputEl.addEventListener('blur',()=>setTimeout(()=>resultsEl.classList.remove('on'),150));
}
wireSearch(document.getElementById('sp-search'),document.getElementById('sp-results'));

  if(transitOn){
    html+=`<div class="ml-title" style="margin-top:7px">${t.layers.transit}</div>`+
      `<div class="ml-item"><span class="ml-dot" style="background:${TRANSIT_COLOR.train}"></span>${t.train}</div>`+
      `<div class="ml-item"><span class="ml-dot" style="background:${TRANSIT_COLOR.tram}"></span>${t.tram}</div>`;
  }
  if(schoolOn){
    html+=`<div class="ml-title" style="margin-top:7px">${t.layers.schools}</div>`+
      `<div class="ml-item"><span class="ml-dot" style="background:${SCHOOL_COLOR.p}"></span>${t.schoolTypes.p}</div>`+
      `<div class="ml-item"><span class="ml-dot" style="background:${SCHOOL_COLOR.s}"></span>${t.schoolTypes.s}</div>`+
      `<div class="ml-item"><span class="ml-dot" style="background:${SCHOOL_COLOR.o}"></span>${t.schoolTypes.o}</div>`;
  }
  el.innerHTML=html;
}

// ═══════════════ 피드백 모달 ═══════════════
const FEEDBACK_ENDPOINT='https://formsubmit.co/ajax/4daba310c39387b2cac62a9e9796d9c6';
function tl(t){return{tip:'💡 꿀팁',correction:'🔧 정정',experience:'✨ 경험담',question:'❓ 질문'}[t]||t;}
let lastSent=0;
document.getElementById('fb-open').addEventListener('click',()=>document.getElementById('fb-overlay').classList.add('on'));
document.getElementById('fbm-close').addEventListener('click',()=>document.getElementById('fb-overlay').classList.remove('on'));
document.getElementById('fb-overlay').addEventListener('click',(e)=>{
  if(e.target===document.getElementById('fb-overlay'))document.getElementById('fb-overlay').classList.remove('on');
});
document.getElementById('fbm-send').addEventListener('click',async()=>{
  const btn=document.getElementById('fbm-send'),status=document.getElementById('fbm-status'),t=T();
  const body=document.getElementById('f-body').value.trim();
  if(!body){status.textContent=t.stEmpty;status.className='fbm-status err';return;}
  if(body.length>2000){status.textContent=t.stLong;status.className='fbm-status err';return;}
  if(Date.now()-lastSent<30000){status.textContent=t.stWait;status.className='fbm-status err';return;}
  btn.disabled=true;status.textContent=t.stSending;status.className='fbm-status';
  const author=document.getElementById('f-author').value.trim()||'익명';
  const area=document.getElementById('f-area').value;
  const type=tl(document.getElementById('f-type').value);
  try{
    const r=await fetch(FEEDBACK_ENDPOINT,{
      method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({_subject:`[Adelaide 지도 피드백] ${type} · ${area}`,_template:'table',_captcha:'false',닉네임:author,지역:area,유형:type,내용:body}),
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    lastSent=Date.now();
    status.textContent=t.stOk;status.className='fbm-status ok';
    document.getElementById('f-body').value='';document.getElementById('f-author').value='';
  }catch{status.textContent=t.stFail;status.className='fbm-status err';}
  btn.disabled=false;
});

// ═══════════════ 토스트 & 언어 ═══════════════
let toastTimer=null;
function toast(msg,ms){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('on'),ms||2500);
}
function applyLang(){
  const t=T();
  document.documentElement.lang=LANG;document.title=t.docTitle;
  document.getElementById('sp-title').textContent=t.title;
  document.getElementById('lang-toggle').textContent=t.langBtn;
  document.getElementById('sp-search').placeholder=t.searchPh;
  document.getElementById('m-search').placeholder=t.searchPh;
  document.getElementById('m-lang').textContent=t.langBtn;
  document.getElementById('ml-chip-label').textContent=t.legTitle;
  document.getElementById('lbl-cat').textContent=t.lblCat;
  document.getElementById('lbl-overlay').textContent=t.lblOverlay;
  document.getElementById('lbl-color').textContent=t.lblColor;
  document.getElementById('fb-open').textContent=t.fbOpen;
  document.getElementById('sp-foot').textContent=t.sources;
  renderChips();renderOverlayRows();renderColorSeg();renderMiniLegend();buildVibes();
  if(selectedLgaId)openSheet(selectedLgaId);
  // 레이어 툴팁 언어 재생성
  [['suburb',()=>suburbLayer,(v)=>suburbLayer=v,buildSuburbLayer,()=>suburbOn],
   ['transit',()=>transitLayer,(v)=>transitLayer=v,buildTransitLayer,()=>transitOn],
   ['school',()=>schoolLayer,(v)=>schoolLayer=v,buildSchoolLayer,()=>schoolOn]].forEach(([_,get,set,build,isOn])=>{
    if(get()){
      const wasOn=isOn();
      if(wasOn)map.removeLayer(get());
      if(_==='suburb')selectedSubPoly=null;
      set(null);
      if(wasOn){build();get().addTo(map);}
    }
  });
  rebindMarkerPopups();
  // 모달
  document.getElementById('fbm-title').textContent=t.fbTitle;
  document.getElementById('fbm-sub').textContent=t.fbSub;
  document.getElementById('fbm-lbl-author').textContent=t.lblAuthor;
  document.getElementById('f-author').placeholder=t.phAuthor;
  document.getElementById('fbm-lbl-type').textContent=t.lblType;
  document.querySelectorAll('#f-type option').forEach(o=>{o.textContent=t.types[o.value]||o.textContent;});
  document.getElementById('fbm-lbl-area').textContent=t.lblArea;
  document.getElementById('opt-none').textContent=t.optNone;
  document.getElementById('fbm-lbl-body').textContent=t.lblBody;
  document.getElementById('f-body').placeholder=t.phBody;
  document.getElementById('fbm-send').textContent=t.btnSend;
  document.getElementById('fbm-status').textContent='';
}
function toggleLang(){
  LANG=LANG==='ko'?'en':'ko';
  try{localStorage.setItem('adelaide-lang',LANG);}catch{}
  applyLang();
}
document.getElementById('lang-toggle').addEventListener('click',toggleLang);
document.getElementById('m-lang').addEventListener('click',toggleLang);

// ═══════════════ 모바일: FAB 팝오버 & 범례 칩 ═══════════════
function closePops(){
  document.querySelectorAll('.m-pop').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.fab').forEach(f=>f.classList.remove('active'));
}
function togglePop(fabId,popId){
  const pop=document.getElementById(popId),fab=document.getElementById(fabId);
  const wasOn=pop.classList.contains('on');
  closePops();
  if(!wasOn){pop.classList.add('on');fab.classList.add('active');}
}
document.getElementById('fab-layers').addEventListener('click',(e)=>{e.stopPropagation();togglePop('fab-layers','m-pop-layers');});
document.getElementById('fab-color').addEventListener('click',(e)=>{e.stopPropagation();togglePop('fab-color','m-pop-color');});
document.getElementById('fab-fb').addEventListener('click',()=>{closePops();document.getElementById('fb-overlay').classList.add('on');});
document.querySelectorAll('.m-pop').forEach(p=>p.addEventListener('click',(e)=>e.stopPropagation()));
map.on('click',closePops);
map.on('dragstart',closePops);

document.getElementById('ml-chip').addEventListener('click',()=>{
  document.getElementById('mini-legend').classList.toggle('open');
});
// 모바일에서 펼쳐진 범례를 탭하면 닫힘
document.getElementById('mini-legend').addEventListener('click',()=>{
  if(window.matchMedia('(max-width:680px)').matches)
    document.getElementById('mini-legend').classList.remove('open');
});

// ═══════════════ INIT ═══════════════
applyLang();
setSuburbLayer(true);
restyleAll();
// 딥링크: ?lga=unley
try{
  const cm=new URLSearchParams(location.search).get('color');
  if(cm==='rent'||cm==='crime'){mapColorMode=cm;renderColorSeg();restyleAll();}
  const sel=new URLSearchParams(location.search).get('lga');
  if(sel&&LGAS[sel]){openSheet(sel);map.fitBounds(lgaLayers[sel].getBounds(),{padding:[40,40],maxZoom:13});}
  else toast(T().hint,3200);
}catch{toast(T().hint,3200);}
</script>
